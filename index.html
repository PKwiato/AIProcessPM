<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0B0C10; 
  --surface: rgba(22, 24, 30, 0.8);
  --surface2: #1D1F27;
  --border: rgba(255,255,255,0.08);
  --purple: #8B80F9; --pd: rgba(139, 128, 249, 0.15); --pb: rgba(139, 128, 249, 0.4);
  --teal: #42E2B8; --td: rgba(66, 226, 184, 0.12); --tb: rgba(66, 226, 184, 0.35);
  --coral: #FF7E5F; --cd: rgba(255, 126, 95, 0.12); --cb: rgba(255, 126, 95, 0.35);
  --amber: #FFD23F; --ad: rgba(255, 210, 63, 0.15); --ab: rgba(255, 210, 63, 0.45);
  --red: #FF5E5E; --rd: rgba(255, 94, 94, 0.12); --rb: rgba(255, 94, 94, 0.35);
  --panel-width: 420px;
}
body { 
  font-family: 'DM Sans', sans-serif; 
  background: var(--bg); 
  color: #E4E2DA; 
  min-height: 100vh; 
  display: flex; 
  flex-direction: column; 
  overflow: auto;
  background-image: 
    radial-gradient(circle at 20% 20%, rgba(139, 128, 249, 0.03) 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(66, 226, 184, 0.03) 0%, transparent 40%);
}

header { 
  height: 64px;
  padding: 0 32px; 
  display: flex; 
  align-items: center; 
  gap: 16px; 
  border-bottom: 1px solid var(--border); 
  background: rgba(14, 15, 19, 0.9);
  backdrop-filter: blur(10px);
  flex-shrink: 0; 
  z-index: 100;
  position: sticky;
  top: 0;
}
header h1 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
.hb { font-size: 10px; font-weight: 600; padding: 4px 12px; border-radius: 20px; letter-spacing: .6px; cursor: default; transition: transform 0.2s; }
.hb:hover { transform: translateY(-1px); }
.hb-p { background: var(--pd); color: var(--purple); border: 1px solid var(--pb); }
.hb-c { background: var(--cd); color: var(--coral);  border: 1px solid var(--cb); }
.hb-a { background: var(--ad); color: var(--amber);  border: 1px solid var(--ab); }

.sim-btn {
  margin-left: 20px;
  background: var(--purple);
  color: #fff;
  border: none;
  padding: 6px 16px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sim-btn:hover { background: #9D94FF; transform: scale(1.05); box-shadow: 0 4px 12px rgba(139, 128, 249, 0.3); }
.sim-btn.active { background: var(--red); }

.zoom-ctrl {
  display: flex;
  align-items: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px;
  margin-left: 12px;
}
.zoom-btn {
  background: transparent;
  border: none;
  color: #888;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.2s;
}
.zoom-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
.zoom-val {
  font-size: 11px;
  font-weight: 700;
  color: #666;
  width: 40px;
  text-align: center;
  font-family: 'Syne', sans-serif;
}

.legend { margin-left: auto; display: flex; gap: 20px; }
.li { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #888; }
.ld { width:10px; height:10px; border-radius:3px; }

.main { 
  display: flex; 
  flex: 1; 
  position: relative;
}
.wrap { 
  flex: 1; 
  padding: 60px 40px; 
  display: block;
  perspective: 1000px;
}
.wrap::-webkit-scrollbar { width: 8px; height: 8px; } 
.wrap::-webkit-scrollbar-track { background: transparent; }
.wrap::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; border: 2px solid var(--bg); }
.wrap::-webkit-scrollbar-thumb:hover { background: #666; }

/* SVG styling */
svg { stroke-linecap: round; stroke-linejoin: round; }

#diagram {
  display: block;
  margin: 0 auto;
  filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.node { cursor: pointer; outline: none; }
.node rect, .node polygon { 
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
}
.node:hover rect, .node:hover polygon { 
  filter: brightness(1.3) saturate(1.2); 
  transform: translateY(-2px);
}
.node.active rect, .node.active polygon { 
  filter: brightness(1.4) saturate(1.3); 
  stroke-width: 2px;
  stroke: #fff;
}
.node text { transition: all 0.3s; pointer-events: none; }

/* SVG Global Visibility Fixes */
svg line, svg path {
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Ensure lines are visible even if they are very thin */
svg line:not(.flow-line), svg path:not(.flow-line) {
  stroke-opacity: 0.7;
}

/* Flow Animations & Visibility */
.flow-line {
  stroke-dasharray: 8, 12;
  animation: flow 20s linear infinite;
}
@keyframes flow {
  from { stroke-dashoffset: 400; }
  to { stroke-dashoffset: 0; }
}

/* Background lines for visibility */
.line-bg {
  stroke-width: 2;
  stroke-linecap: round;
  opacity: 0.6 !important; /* Increased visibility */
}

.pulse-node {
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { filter: brightness(1); }
  50% { filter: brightness(1.5); }
  100% { filter: brightness(1); }
}

/* Panel */
.panel { 
  width: 0; 
  height: calc(100vh - 64px);
  overflow: hidden; 
  background: var(--surface); 
  backdrop-filter: blur(25px);
  border-left: 1px solid var(--border); 
  flex-shrink: 0; 
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
  position: sticky; 
  top: 64px;
  right: 0;
  box-shadow: -15px 0 45px rgba(0,0,0,0.4);
}
.panel.open { width: var(--panel-width); }
.ps { 
  width: var(--panel-width); 
  height: 100%; 
  overflow-y: auto; 
  padding: 40px 32px; 
  scrollbar-width: thin; 
  scrollbar-color: #333 transparent; 
}
.ps::-webkit-scrollbar { width: 4px; } 
.ps::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

.cx { 
  position: absolute; top: 20px; right: 20px; 
  background: var(--surface2); border: 1px solid var(--border); 
  color: #888; cursor: pointer; font-size: 12px; 
  width: 32px; height: 32px; border-radius: 50%; 
  display: flex; align-items: center; justify-content: center; 
  transition: all 0.2s; z-index: 10; 
}
.cx:hover { color: #fff; background: var(--red); border-color: var(--red); transform: rotate(90deg); }

.pb2 { 
  display: inline-block; font-size: 10px; font-weight: 700; 
  padding: 4px 12px; border-radius: 4px; margin-bottom: 16px; 
  letter-spacing: 1px; text-transform: uppercase; 
}
.bp { background: var(--pd); color: var(--purple); border: 1px solid var(--pb); }
.bt { background: var(--td); color: var(--teal); border: 1px solid var(--tb); }
.bc { background: var(--cd); color: var(--coral); border: 1px solid var(--cb); }
.ba { background: var(--ad); color: var(--amber); border: 1px solid var(--ab); }
.bg2 { background: rgba(255,255,255,0.06); color: #aaa; border: 1px solid var(--border); }

.ptitle { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; line-height: 1.1; margin-bottom: 12px; color: #fff; }
.pdesc { font-size: 14px; line-height: 1.6; color: #aaa; margin-bottom: 24px; }

.sec { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #555; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.sec::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.steps { list-style: none; margin-bottom: 24px; }
.steps li { display: flex; gap: 12px; margin-bottom: 12px; font-size: 13.5px; line-height: 1.5; color: #999; transition: color 0.2s; }
.steps li:hover { color: #fff; }
.sn { 
  flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; 
  background: var(--surface2); border: 1px solid var(--border); 
  display: flex; align-items: center; justify-content: center; 
  font-size: 10px; font-weight: 700; color: #666; margin-top: 2px; 
}

.tools { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
.chip { 
  background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
  color: #888; font-size: 11px; padding: 4px 10px; border-radius: 6px; 
  font-family: 'DM Sans', sans-serif; font-weight: 500;
}

.code { 
  background: #050608; border: 1px solid var(--border); border-radius: 12px; 
  padding: 16px; font-size: 11.5px; font-family: 'Monaco', 'Consolas', monospace; 
  line-height: 1.6; color: #5ecfb0; overflow-x: auto; white-space: pre;
  box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
}

.dbox { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.dopt { border-radius: 10px; padding: 14px 18px; transition: transform 0.2s; cursor: pointer; }
.dopt:hover { transform: translateX(4px); }
.dok { background: var(--td); border: 1px solid var(--tb); }
.dno { background: var(--rd); border: 1px solid var(--rb); }
.dopt h4 { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.dok h4 { color: var(--teal); } .dno h4 { color: var(--red); }
.dopt p { font-size: 12px; color: #999; line-height: 1.5; }

.next-step {
  margin-top: 32px;
  width: 100%;
  padding: 14px;
  background: var(--purple);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.3s;
}
.next-step:hover { background: #9D94FF; transform: scale(1.02); }

.empty { 
  display: flex; flex-direction: column; align-items: center; justify-content: center; 
  height: 100%; color: #444; font-size: 14px; text-align: center; gap: 16px; padding: 40px; 
}
.empty svg { opacity: 0.2; filter: drop-shadow(0 0 10px var(--purple)); }

.progress-wrap { position: sticky; top: -40px; left: -32px; right: -32px; height: 4px; background: rgba(0,0,0,0.2); z-index: 20; margin: -40px -32px 30px; }
.progress-bar { height: 100%; background: linear-gradient(90deg, var(--purple), var(--teal)); width: 0%; transition: width 0.4s; box-shadow: 0 0 10px var(--purple); }

.sim-active { 
  stroke-width: 3px !important;
  stroke: #fff !important;
  filter: brightness(1.6) drop-shadow(0 0 15px var(--purple)) !important;
}

@media (max-width: 1000px) {
  .panel.open { width: 100%; position: absolute; right: 0; top: 0; height: 100%; z-index: 200; }
  .ps { width: 100%; }
}

</style>
</head>

const panel = document.getElementById('panel');
const ps = document.getElementById('ps');
const cx = document.getElementById('cx');
const startSim = document.getElementById('startSim');
let active = null;
let simInterval = null;

const FLOW = [
  'notatki', 'dokumenty', 'agent1', 'gate1', 'agent2', 'agent3', 'gate_prd', 
  'prd_confluence', 'pm_trigger', 'agent4', 'gate_backlog', 'out_jira', 
  'gate_sprint', 'agent5', 'gate_report', 'ssot', 'slack', 'jira_sync'
];

function render(id) {
  const d = D[id]; if (!d) return;
  const currentIndex = FLOW.indexOf(id);
  const nextId = FLOW[currentIndex + 1];
  const progress = ((currentIndex + 1) / FLOW.length) * 100;
  
  const steps = d.s.map((s,i)=>`<li><span class="sn">${i+1}</span><span>${s}</span></li>`).join('');
  const chips = d.tools.map(t=>`<span class="chip">${t}</span>`).join('');
  const dec = d.dec ? `<div class="sec">Możliwe decyzje PM</div><div class="dbox">
    <div class="dopt dok" onclick="nextStep('${FLOW[currentIndex+1]}')"><h4>${d.dec.ok.t}</h4><p>${d.dec.ok.x}</p></div>
    <div class="dopt dno"><h4>${d.dec.no.t}</h4><p>${d.dec.no.x}</p></div>
    </div>` : '';
  const code = d.code ? `<div class="div"></div><div class="sec">Implementacja</div><div class="code">${d.code}</div>` : '';
  
  const nextBtn = nextId ? `<button class="next-step" onclick="nextStep('${nextId}')">
    Kontynuuj proces: ${D[nextId].t}
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>` : '';

  ps.innerHTML = `
    <div class="progress-wrap"><div class="progress-bar" style="width: ${progress}%"></div></div>
    <span class="pb2 ${d.b}">${d.l}</span>
    <div class="ptitle">${d.t}</div>
    <div class="pdesc">${d.d}</div>
    ${dec}
    <div class="sec">Jak to działa</div>
    <ul class="steps">${steps}</ul>
    <div class="sec">Narzędzia</div>
    <div class="tools">${chips}</div>
    ${code}
    ${nextBtn}`;
  ps.scrollTop = 0;
  panel.classList.add('open');
}

const wrap = document.querySelector('.wrap');

window.nextStep = (id) => {
  const el = document.querySelector(`.node[data-id="${id}"]`);
  if (el) {
    if (active) active.classList.remove('active');
    el.classList.add('active');
    active = el;
    render(id);
    
    // Custom smooth scroll that works with .wrap
    const rect = el.getBoundingClientRect();
    const wrapRect = wrap.getBoundingClientRect();
    const scrollTop = wrap.scrollTop + rect.top - wrapRect.top - (wrapRect.height / 2) + (rect.height / 2);
    wrap.scrollTo({ top: scrollTop, behavior: 'smooth' });
  }
};

function close() {
  panel.classList.remove('open');
  if (active) { active.classList.remove('active'); active = null; }
  stopSimulation();
  setTimeout(()=>{ ps.innerHTML=`<div class="empty"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.1"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Kliknij element na diagramie</div>`; },340);
}

function startSimulation() {
  if (simInterval) {
    stopSimulation();
    return;
  }
  
  startSim.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg> Stop';
  startSim.classList.add('active');
  
  let i = 0;
  nextStep(FLOW[i]);
  
  simInterval = setInterval(() => {
    i++;
    if (i >= FLOW.length) {
      stopSimulation();
      return;
    }
    nextStep(FLOW[i]);
  }, 4000);
}

function stopSimulation() {
  clearInterval(simInterval);
  simInterval = null;
  startSim.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Uruchom Symulację';
  startSim.classList.remove('active');
}

document.querySelectorAll('.node[data-id]').forEach(n => {
  n.addEventListener('click', function() {
    stopSimulation();
    if (active) active.classList.remove('active');
    this.classList.add('active'); active = this;
    render(this.dataset.id);
  });
});

cx.addEventListener('click', close);
startSim.addEventListener('click', startSimulation);

// Zoom Logic
let currentZoom = 1;
const diagram = document.getElementById('diagram');
const zoomVal = document.getElementById('zoomVal');
const BASE_WIDTH = 1200;

function updateZoom() {
  const scale = currentZoom;
  const newWidth = BASE_WIDTH * scale;
  diagram.style.width = `${newWidth}px`;
  diagram.style.maxWidth = 'none'; 
  diagram.style.minWidth = 'none';
  zoomVal.innerText = Math.round(scale * 100) + '%';
}

document.getElementById('zoomIn').addEventListener('click', () => {
  if (currentZoom < 3.0) {
    currentZoom += 0.2;
    updateZoom();
  }
});

document.getElementById('zoomOut').addEventListener('click', () => {
  if (currentZoom > 0.4) {
    currentZoom -= 0.2;
    updateZoom();
  }
});

document.getElementById('zoomReset').addEventListener('click', () => {
  currentZoom = 1;
  diagram.style.width = '100%';
  diagram.style.maxWidth = '1200px';
  diagram.style.minWidth = '720px';
  zoomVal.innerText = '100%';
});

// Basic Keyboard Support
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') close();
});
